version: '3.9'

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - apps/server/src/config/.env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 400M
  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    ports:
      - '1337:1337'
    env_file:
      - apps/cms/.env
    volumes:
      - /opt/docker-volumes/cms_uploads/:/app/public/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 800M
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - apps/web/.env
    depends_on:
      - server
      - cms
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 600M