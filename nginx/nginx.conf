# Nginx reverse-proxy configuration for medsupport.kz
#
# Place this file at /etc/nginx/sites-available/medsupport and enable it:
#   sudo ln -s /etc/nginx/sites-available/medsupport /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumptions
#   - web  (Next.js)   listens on 127.0.0.1:3000
#   - cms  (Strapi)    listens on 127.0.0.1:1337
#
# apps/server (Express, port 8000) is NOT running — all its routes are
# disabled in apps/web/src/routes.ts.  The /api/, /auth/, and /socket.io/
# blocks have been removed.  Any request to those paths falls through to the
# Next.js catch-all which returns a 404 page instead of a 502 Bad Gateway.
# See docs/server-analysis.md for details.

# ── gzip compression ────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json
           application/javascript application/xml+rss
           application/atom+xml image/svg+xml;

# ── upstream definitions ────────────────────────────────────────────────────
upstream web_upstream {
    server 127.0.0.1:3000;
    keepalive 8;
}

upstream cms_upstream {
    server 127.0.0.1:1337;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name medsupport.kz www.medsupport.kz;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name medsupport.kz www.medsupport.kz;

    # TLS certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/medsupport.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medsupport.kz/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Static asset caching (Next.js /_next/static) ──────────────────────
    location /_next/static/ {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Strapi CMS ─────────────────────────────────────────────────────────
    location /cms/ {
        proxy_pass http://cms_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        # Increase buffer size for Strapi's larger admin panel responses.
        proxy_buffer_size   128k;
        proxy_buffers       4 256k;
    }

    # ── Next.js web app (catch-all) ────────────────────────────────────────
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
